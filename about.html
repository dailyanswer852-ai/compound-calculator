<body class="bg-slate-50 text-slate-900">
    <div class="max-w-4xl mx-auto px-6 py-12">
        <h1 class="text-4xl font-bold mb-8">關於復利計算器</h1>
        
        <div class="prose max-w-none">
            <p class="text-lg mb-6">復利計算器係一個免費、簡單易用嘅線上工具，專為幫助大家了解複利增長嘅力量而設計。</p>

                <li>中英雙語支援</li>
            </ul>
